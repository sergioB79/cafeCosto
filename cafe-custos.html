<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custo do Café</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c0a;
    --card: #1a1712;
    --border: #2a2420;
    --accent: #c8922a;
    --gold: #e8b84b;
    --text: #e0d8cc;
    --muted: #6a6058;
    --green: #5aaa60;
    --red: #c84a2a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }
  .container { max-width: 820px; margin: 0 auto; }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 7vw, 5rem);
    color: var(--gold); letter-spacing: 0.04em; line-height: 1;
  }
  .sub {
    font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 2.5rem;
  }
  .section-title {
    font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 0.8rem;
    padding-bottom: 0.4rem; border-bottom: 1px solid var(--border);
  }
  .inputs-block { margin-bottom: 1.6rem; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
  @media(max-width:520px) { .row-2 { grid-template-columns: 1fr; } }
  .ctrl { background: var(--card); border: 1px solid var(--border); padding: 1rem 1.1rem; }
  .ctrl label {
    display: block; font-size: 0.6rem; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 0.7rem;
  }
  .slider-row { display: flex; align-items: center; gap: 0.8rem; }
  input[type=range] {
    flex: 1; -webkit-appearance: none;
    height: 2px; background: var(--border); outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 13px; height: 13px;
    border-radius: 50%; background: var(--accent); cursor: pointer;
  }
  .sval { font-size: 1rem; color: var(--gold); min-width: 4rem; text-align: right; }
  .tabs {
    display: flex; border: 1px solid var(--border);
    margin-bottom: 1.8rem; overflow: hidden;
  }
  .tab {
    flex: 1; padding: 0.65rem 0.5rem;
    background: var(--card); border: none; color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 0.62rem;
    letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; transition: all 0.12s;
    border-right: 1px solid var(--border);
  }
  .tab:last-child { border-right: none; }
  .tab.active { background: var(--accent); color: #0e0c0a; }
  .summary {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 0.8rem; margin-bottom: 1.8rem;
  }
  @media(max-width:480px) { .summary { grid-template-columns: 1fr 1fr; } }
  .s-card { background: var(--card); border: 1px solid var(--border); padding: 0.9rem; }
  .s-card.hi { border-color: var(--accent); }
  .s-label { font-size: 0.55rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.35rem; }
  .s-val { font-size: 1.2rem; color: var(--gold); }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.76rem; }
  thead tr { border-bottom: 2px solid var(--accent); }
  th {
    font-size: 0.58rem; letter-spacing: 0.13em; text-transform: uppercase;
    color: var(--muted); padding: 0.6rem 0.7rem; text-align: right;
  }
  th:first-child { text-align: left; }
  td { padding: 0.55rem 0.7rem; text-align: right; border-bottom: 1px solid var(--border); }
  td:first-child { text-align: left; color: var(--muted); }
  tr:hover td { background: var(--card); }
  tr.yr10 td { color: var(--gold); }
  .col-main { color: var(--accent); }
  .col-cum  { color: var(--text); }
  .note {
    margin-top: 1.5rem; padding: 0.9rem 1rem;
    border-left: 3px solid var(--accent);
    background: var(--card);
    font-size: 0.68rem; color: var(--muted); line-height: 1.7;
  }
</style>
</head>
<body>
<div class="container">

  <h1>CUSTO DO CAFÉ</h1>
  <div class="sub">despesa anual · 1 a 10 anos</div>

  <!-- 1. TOTAL -->
  <div class="inputs-block">
    <div class="section-title">1 · Total de cafés por dia</div>
    <div style="display:inline-flex; align-items:baseline; gap:0.6rem; padding: 0.5rem 0 0.2rem 0.1rem;">
      <span id="total-val" style="font-family:'Bebas Neue',sans-serif; font-size:3.5rem; color:var(--gold); line-height:1;">3</span>
      <span style="font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted);">cafés / dia</span>
    </div>
  </div>

  <!-- 2. FORA -->
  <div class="inputs-block">
    <div class="section-title">2 · Fora de casa</div>
    <div class="row-2">
      <div class="ctrl">
        <label>Quantidade fora</label>
        <div class="slider-row">
          <input type="range" id="qtdFora" min="0" max="10" step="1" value="1">
          <span class="sval" id="qtdFora-val">1</span>
        </div>
      </div>
      <div class="ctrl">
        <label>Preço por café (€)</label>
        <div class="slider-row">
          <input type="range" id="precoFora" min="0.50" max="2.00" step="0.05" value="0.75">
          <span class="sval" id="precoFora-val">0,75 €</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 3. CASA -->
  <div class="inputs-block">
    <div class="section-title">3 · Em casa (cápsulas)</div>
    <div class="row-2">
      <div class="ctrl">
        <label>Quantidade cápsulas</label>
        <div class="slider-row">
          <input type="range" id="qtdCasa" min="0" max="10" step="1" value="2">
          <span class="sval" id="qtdCasa-val">2</span>
        </div>
      </div>
      <div class="ctrl">
        <label>Preço por cápsula (€)</label>
        <div class="slider-row">
          <input type="range" id="precoCasa" min="0.20" max="2.00" step="0.05" value="0.35">
          <span class="sval" id="precoCasa-val">0,35 €</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 4. INFLAÇÃO -->
  <div class="inputs-block">
    <div class="section-title">4 · Projeção temporal</div>
    <div class="ctrl" style="max-width:400px">
      <label>Inflação / aumento anual (%)</label>
      <div class="slider-row">
        <input type="range" id="inflacao" min="0" max="10" step="0.5" value="3">
        <span class="sval" id="inflacao-val">3%</span>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="setMode('misto')">Misto — fora + casa</button>
    <button class="tab" onclick="setMode('fora')">Só fora de casa</button>
    <button class="tab" onclick="setMode('casa')">Só em casa</button>
  </div>

  <div class="summary" id="summary"></div>
  <div class="table-wrap"><table id="tabela"></table></div>
  <div class="note" id="nota"></div>

</div>
<script>
let mode = 'misto';

function setMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['misto','fora','casa'][i] === m);
  });
  render();
}

function fmt(v)  { return v.toFixed(2).replace('.',',') + ' \u20ac'; }
function fmtP(v) { return v.toFixed(2).replace('.',','); }

function render() {
  const qtdFora   = +document.getElementById('qtdFora').value;
  const precoFora = +document.getElementById('precoFora').value;
  const qtdCasa   = +document.getElementById('qtdCasa').value;
  const precoCasa = +document.getElementById('precoCasa').value;
  const inflacao  = +document.getElementById('inflacao').value;

  document.getElementById('total-val').textContent = qtdFora + qtdCasa;

  const total  = qtdFora + qtdCasa;
  const dFora  = total * precoFora;
  const dCasa  = total * precoCasa;
  const dMisto = qtdFora * precoFora + qtdCasa * precoCasa;

  const dAtivo = mode === 'fora' ? dFora : mode === 'casa' ? dCasa : dMisto;
  const label  = mode === 'fora' ? 'Só fora' : mode === 'casa' ? 'Só casa' : 'Misto';

  // summary cards
  document.getElementById('summary').innerHTML = `
    <div class="s-card hi"><div class="s-label">${label} · diário</div><div class="s-val">${fmt(dAtivo)}</div></div>
    <div class="s-card hi"><div class="s-label">${label} · mensal</div><div class="s-val">${fmt(dAtivo*30.4)}</div></div>
    <div class="s-card hi"><div class="s-label">${label} · ano 1</div><div class="s-val">${fmt(dAtivo*365)}</div></div>
  `;

  // table header
  const colLabel = mode === 'misto'
    ? `${qtdFora}× fora + ${qtdCasa}× casa`
    : mode === 'fora' ? `${total}× fora` : `${total}× cápsulas`;

  const showDiff = mode !== 'misto';
  const diffHead = showDiff ? '<th>vs. Misto / ano</th>' : '';

  let html = `<thead><tr>
    <th>Ano</th>
    <th>${colLabel} / ano</th>
    <th>Acumulado</th>
    ${diffHead}
  </tr></thead><tbody>`;

  let cumul = 0;
  for (let yr = 1; yr <= 10; yr++) {
    const inf = Math.pow(1 + inflacao/100, yr-1);
    const pF  = precoFora * inf;
    const pC  = precoCasa * inf;

    const total    = qtdFora + qtdCasa;
    const anoMisto = (qtdFora * pF + qtdCasa * pC) * 365;
    const anoFora  = total * pF * 365;
    const anoCasa  = total * pC * 365;
    const anoAtivo = mode === 'fora' ? anoFora : mode === 'casa' ? anoCasa : anoMisto;

    cumul += anoAtivo;

    let diffCell = '';
    if (showDiff) {
      const diff  = anoAtivo - anoMisto;
      const color = diff <= 0 ? 'var(--green)' : 'var(--red)';
      const sign  = diff > 0 ? '+' : '';
      diffCell = `<td><span style="color:${color}">${sign}${fmt(diff)}</span></td>`;
    }

    html += `<tr class="${yr===10?'yr10':''}">
      <td>Ano ${yr}</td>
      <td class="col-main">${fmt(anoAtivo)}</td>
      <td class="col-cum">${fmt(cumul)}</td>
      ${diffCell}
    </tr>`;
  }
  html += '</tbody>';
  document.getElementById('tabela').innerHTML = html;

  // note
  let noteText = '';
  if (mode === 'misto')
    noteText = `${qtdFora} café(s)/dia fora a ${fmtP(precoFora)} € + ${qtdCasa} cápsula(s)/dia em casa a ${fmtP(precoCasa)} €. Este é o cenário de referência.`;
  else if (mode === 'fora')
    noteText = `${total} café(s)/dia todos fora a ${fmtP(precoFora)} €. <b>vs. Misto</b>: diferença face ao cenário combinado — verde = mais barato, vermelho = mais caro.`;
  else
    noteText = `${total} café(s)/dia todos em casa a ${fmtP(precoCasa)} €/cápsula. <b>vs. Misto</b>: diferença face ao cenário combinado — verde = mais barato, vermelho = mais caro.`;

  document.getElementById('nota').innerHTML =
    `<b>Cenário activo:</b> ${noteText} Inflação de ${inflacao}% ao ano aplicada a todos os preços.`;
}

['qtdFora','precoFora','qtdCasa','precoCasa','inflacao'].forEach(id => {
  document.getElementById(id).addEventListener('input', e => {
    const v = parseFloat(e.target.value);
    const el = document.getElementById(id+'-val');
    if (id === 'precoFora' || id === 'precoCasa') el.textContent = v.toFixed(2).replace('.',',') + ' €';
    else if (id === 'inflacao') el.textContent = v + '%';
    else el.textContent = v;
    render();
  });
});

render();
</script>
</body>
</html>
